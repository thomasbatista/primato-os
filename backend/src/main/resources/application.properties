spring.application.name=PrimatoOsBackend

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=28800000

app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

app.bootstrap.manager-name=${BOOTSTRAP_MANAGER_NAME:Administrador}
app.bootstrap.manager-email=${BOOTSTRAP_MANAGER_EMAIL:}
app.bootstrap.manager-password=${BOOTSTRAP_MANAGER_PASSWORD:}
